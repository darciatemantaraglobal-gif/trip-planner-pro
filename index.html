<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no, interactive-widget=resizes-content" />
    <title>IGH Tour</title>
    <meta name="description" content="Aplikasi manajemen trip, jamaah, paket, kalkulasi biaya, dan dokumen untuk Umrah dan Haji." />
    <meta name="author" content="IGH Tour" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Theme color — matches brand orange -->
    <meta name="theme-color" content="#f97316" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a0800" media="(prefers-color-scheme: dark)" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="IGH Tour" />
    <link rel="apple-touch-icon" href="/logo-igh-tour.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/logo-igh-tour.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/logo-igh-tour.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/logo-igh-tour.png" />

    <!-- iOS Splash Screens (portrait) -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Microsoft Tiles -->
    <meta name="msapplication-TileColor" content="#f97316" />
    <meta name="msapplication-TileImage" content="/logo-igh-tour.png" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logo-igh-tour.png" />
    <link rel="shortcut icon" href="/logo-igh-tour.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="IGH Tour" />
    <meta property="og:description" content="Aplikasi manajemen trip, jamaah, paket, kalkulasi biaya, dan dokumen untuk Umrah dan Haji." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/logo-igh-tour.png" />
    <meta property="og:locale" content="id_ID" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@ightour" />
    <meta name="twitter:image" content="/logo-igh-tour.png" />

    <!-- Preconnect for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
